<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>テストパーク</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #d0f0f5; min-height: 100vh; }
        header { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(255,255,255,0.7); backdrop-filter: blur(5px); display: flex; align-items: center; padding: 0 20px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); z-index: 100; }
        .back-btn { background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.1); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; color: #000; }
        .main-wrapper { margin-top: 100px; padding: 0 20px; }
        .container { display: flex; gap: 20px; max-width: 1000px; margin: 0 auto; flex-wrap: wrap; }
        .card { flex: 1 1 400px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card-header-bar { padding: 15px 20px; color: white; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        .orange-bg { background-color: #f39b40; }
        .blue-bg { background-color: #50a8e0; }
        .card-content { padding: 10px; min-height: 300px; }
        .item-row { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        button { border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <button class="back-btn" onclick="location.href='https://projector0116-lab.github.io/jikanwarietsuran/'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        前に戻る
    </button>
    <span style="font-weight: bold; font-size: 1.2rem; margin-left: 20px;">ホーム</span>
</header>

<div class="main-wrapper">
    <div class="container">
        <div class="card">
            <div class="card-header-bar orange-bg">これからやるテスト</div>
            <div class="card-content" id="todo-list"></div>
        </div>
        <div class="card">
            <div class="card-header-bar blue-bg">実施済みのテスト</div>
            <div class="card-content" id="done-list"></div>
        </div>
    </div>
</div>

<script>
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            const todoList = document.getElementById('todo-list');
            const doneList = document.getElementById('done-list');
            
            // data.jsonの最初の数個をテスト項目として表示
            data.filter(item => item.title).forEach(item => {
                const parent = item.status === 'todo' ? todoList : doneList;
                parent.innerHTML += `
                    <div class="item-row">
                        <span>${item.title}</span>
                        <button style="background:${item.status === 'todo' ? '#f39b40' : '#50a8e0'};">
                            ${item.status === 'todo' ? 'テストルームへ' : '結果へ'}
                        </button>
                    </div>
                `;
            });
        });
</script>
</body>
</html>
